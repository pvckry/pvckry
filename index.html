<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paul Vickery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ece3;
      --muted: #4a4a4a;
      --accent: #c8b89a;
      --line: rgba(240, 236, 227, 0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Subtle radial glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(200, 184, 154, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 48px 56px;
    }

    .main {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .eyebrow::before {
      content: '—';
      margin-right: 10px;
      opacity: 0.5;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(56px, 8vw, 110px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      font-weight: 400;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.35s;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      margin-top: 36px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.5s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 28px 0;
      opacity: 0;
      animation: expandLine 0.8s ease forwards 0.65s;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    .location {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .links {
      display: flex;
      gap: 24px;
    }

    .links a {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
      position: relative;
    }

    .links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .links a:hover {
      color: var(--fg);
    }

    .links a:hover::after {
      width: 100%;
    }

    .corner-label {
      position: fixed;
      top: 48px;
      right: 56px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .corner-label span {
      color: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes expandLine {
      from { opacity: 0; width: 0; }
      to   { opacity: 1; width: 40px; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    @media (max-width: 600px) {
      .container {
        padding: 32px 28px;
        min-height: 100vh;
      }
      .corner-label { top: 32px; right: 28px; }
      .footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding-bottom: 8px;
      }
      .links {
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-lines"></div>

  <div class="corner-label">vickery<span>.dev</span></div>

  <div class="container">
    <div class="main">
      <p class="eyebrow">Something is coming</p>
      <h1>Paul<br><em>Vickery</em></h1>
      <div class="divider"></div>
      <p class="tagline">...<br>Taunton, Somerset.</p>
      <div class="status">
        <div class="dot"></div>
        <span>Currently building</span>
      </div>
    </div>

    <footer class="footer">
      <span class="location">Taunton · Somerset · UK</span>
      <nav class="links">
        <a href="/cdn-cgi/l/email-protection#5a2a3b2f361a2c3339313f2823743e3f2c">Email</a>
        <a href="https://github.com/pvckry" target="_blank">GitHub</a>
        <a href="https://linkedin.com/in/pvckry" target="_blank">LinkedIn</a>
      </nav>
